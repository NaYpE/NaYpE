<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="iframe-container">
      <button class="fullscreen-btn" id="fullscreenBtn">Fullscreen</button>

      <iframe
        id="iframe"
        style="width: 100%; height: 100%; border: none"
        src="https://pointtech.shapespark.com/living_kitchen//"
        scrolling="yes"
        allowfullscreen="true"
        webkitallowfullscreen="true"
        mozallowfullscreen="true"
      >
        This browser does not support Iframe
      </iframe>

      <script>
        !(function (window) {
          const host = "https://labs.heygen.com",
            url =
              host +
              "/guest/streaming-embed?share=eyJxdWFsaXR5IjoiaGlnaCIsImF2YXRhck5hbWUiOiJlYjBhOGNjODA0NmY0NzZkYTU1MWE1NTU5%0D%0AZmJiNWM4MiIsInByZXZpZXdJbWciOiJodHRwczovL2ZpbGVzMi5oZXlnZW4uYWkvYXZhdGFyL3Yz%0D%0AL2ViMGE4Y2M4MDQ2ZjQ3NmRhNTUxYTU1NTlmYmI1YzgyL2Z1bGwvMi4yL3ByZXZpZXdfdGFyZ2V0%0D%0ALndlYnAiLCJuZWVkUmVtb3ZlQmFja2dyb3VuZCI6ZmFsc2UsImtub3dsZWRnZUJhc2VJZCI6IjAy%0D%0AMDA3YWRjYmM3ODQ4ZWViNDU4MzA3MWU0OTQ0YWViIiwidXNlcm5hbWUiOiIyYjQwNGQyMTQwZDU0%0D%0AM2VhOTc1Y2E3MDQzNGQ4OTdjMyJ9&inIFrame=1",
            clientWidth = document.body.clientWidth,
            wrapDiv = document.createElement("div");
          wrapDiv.id = "heygen-streaming-embed";
          const container = document.createElement("div");
          container.id = "heygen-streaming-container";
          const stylesheet = document.createElement("style");
          stylesheet.innerHTML = `\n  #heygen-streaming-embed {\n    z-index: 9999;\n    position: fixed;\n    left: 40px;\n    bottom: 40px;\n    width: 200px;\n    height: 200px;\n    border-radius: 50%;\n    border: 2px solid #fff;\n    box-shadow: 0px 8px 24px 0px rgba(0, 0, 0, 0.12);\n    transition: all linear 0.1s;\n    overflow: hidden;\n\n    opacity: 0;\n    visibility: hidden;\n  }\n  #heygen-streaming-embed.show {\n    opacity: 1;\n    visibility: visible;\n  }\n  #heygen-streaming-embed.expand {\n    ${
            clientWidth < 540
              ? "height: 266px; width: 96%; left: 50%; transform: translateX(-50%);"
              : "height: 366px; width: calc(366px * 16 / 9);"
          }\n    border: 0;\n    border-radius: 8px;\n  }\n  #heygen-streaming-container {\n    width: 100%;\n    height: 100%;\n  }\n  #heygen-streaming-container iframe {\n    width: 100%;\n    height: 100%;\n    border: 0;\n  }\n  `;
          const iframe = document.createElement("iframe");
          (iframe.allowFullscreen = !1),
            (iframe.title = "Streaming Embed"),
            (iframe.role = "dialog"),
            (iframe.allow = "microphone"),
            (iframe.src = url);
          let visible = !1,
            initial = !1;
          window.addEventListener("message", (e) => {
            e.origin === host &&
              e.data &&
              e.data.type &&
              "streaming-embed" === e.data.type &&
              ("init" === e.data.action
                ? ((initial = !0), wrapDiv.classList.toggle("show", initial))
                : "show" === e.data.action
                ? ((visible = !0), wrapDiv.classList.toggle("expand", visible))
                : "hide" === e.data.action &&
                  ((visible = !1),
                  wrapDiv.classList.toggle("expand", visible)));
          }),
            container.appendChild(iframe),
            wrapDiv.appendChild(stylesheet),
            wrapDiv.appendChild(container),
            document.body.appendChild(wrapDiv);
        })(globalThis);
      </script>
    </div>
  </body>
</html>
