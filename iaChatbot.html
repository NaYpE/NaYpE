<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive AI Chat</title>
  </head>
  <body>
    <script>
      !(function (window) {
        const host = "https://labs.heygen.com",
          url =
            host +
            "/guest/streaming-embed?share=eyJxdWFsaXR5IjoiaGlnaCIsImF2YXRhck5hbWUiOiJlYjBhOGNjODA0NmY0NzZkYTU1MWE1NTU5%0D%0AZmJiNWM4MiIsInByZXZpZXdJbWciOiJodHRwczovL2ZpbGVzMi5oZXlnZW4uYWkvYXZhdGFyL3Yz%0D%0AL2ViMGE4Y2M4MDQ2ZjQ3NmRhNTUxYTU1NTlmYmI1YzgyL2Z1bGwvMi4yL3ByZXZpZXdfdGFyZ2V0%0D%0ALndlYnAiLCJuZWVkUmVtb3ZlQmFja2dyb3VuZCI6ZmFsc2UsImtub3dsZWRnZUJhc2VJZCI6IjAy%0D%0AMDA3YWRjYmM3ODQ4ZWViNDU4MzA3MWU0OTQ0YWViIiwidXNlcm5hbWUiOiIyYjQwNGQyMTQwZDU0%0D%0AM2VhOTc1Y2E3MDQzNGQ4OTdjMyJ9&inIFrame=1",
          clientWidth = document.body.clientWidth,
          wrapDiv = document.createElement("div");

        wrapDiv.id = "heygen-streaming-embed";

        // Crear el contenedor principal
        const container = document.createElement("div");
        container.id = "heygen-streaming-container";

        // Estilos dinámicos para ajustar el contenedor y iframe
        const stylesheet = document.createElement("style");
        stylesheet.innerHTML = `
        #heygen-streaming-embed {
            z-index: 9999;
            position: fixed;
            left: 40px;
            bottom: 40px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0px 8px 24px 0px rgba(0, 0, 0, 0.12);
            transition: all linear 0.1s;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
        }

        #heygen-streaming-embed.show {
            opacity: 1;
            visibility: visible;
        }

        #heygen-streaming-embed.expand {
            ${
              clientWidth < 540
                ? "height: 266px; width: 96%; left: 50%; transform: translateX(-50%);"
                : "height: 366px; width: calc(366px * 16 / 9);"
            }
            border: 0;
            border-radius: 8px;
        }

        #heygen-streaming-container {
            width: 100%;
            height: 100%;
        }

        #heygen-streaming-container iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        .css-1izcv2k {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            background-color: #000;
        }

        .css-1izcv2k video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .css-1izcv2k:fullscreen {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
        }

        .css-1izcv2k:fullscreen video {
            object-fit: cover;
            border-radius: 0;
        }

        /* Botón Fullscreen */
        #fullscreenButton {
            display: inline-flex;
            flex-direction: row;
            flex: 0 0 auto;
            position: absolute;
            bottom: 10px;
            right: 10px;
            align-items: center;
            justify-content: center;
            padding: 5px;
            border-radius: 6px;
            border-width: 0px;
            user-select: none;
            font-weight: 600;
            font-size: 14px;
            line-height: 20px;
            background: transparent;
            color: rgb(255, 255, 255);
            cursor: pointer;
            transition: opacity 0.2s ease-out, border-color 0.2s ease-out, color 0.2s ease-out, background 0.2s ease-out, fill 0.2s ease-out, box-shadow 0.2s ease-out;
            opacity: 0;
        }

        #heygen-streaming-embed.expand #fullscreenButton {
            opacity: 1;
        }

        #fullscreenButton:hover {
            background-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        #fullscreenButton:focus {
            outline: none;
        }
        `;

        // Crear el iframe con la URL de la IA
        const iframe = document.createElement("iframe");
        iframe.allowFullscreen = true;
        iframe.title = "AI Streaming Embed";
        iframe.role = "dialog";
        iframe.allow = "microphone";
        iframe.src = url;
        
        // Crear el botón de fullscreen
        const fullscreenButton = document.createElement("button");
        fullscreenButton.id = "fullscreenButton";
        fullscreenButton.textContent = "Fullscreen";
        fullscreenButton.addEventListener("click", () => {
          if (container.requestFullscreen) {
            container.requestFullscreen();
          } else if (container.mozRequestFullScreen) {
            container.mozRequestFullScreen();
          } else if (container.webkitRequestFullscreen) {
            container.webkitRequestFullscreen();
          } else if (container.msRequestFullscreen) {
            container.msRequestFullscreen();
          }
        });

        // Estado de visibilidad
        let visible = false,
          initial = false;

        window.addEventListener("message", (e) => {
          if (
            e.origin === host &&
            e.data &&
            e.data.type === "streaming-embed"
          ) {
            switch (e.data.action) {
              case "init":
                initial = true;
                wrapDiv.classList.toggle("show", initial);
                break;
              case "show":
                visible = true;
                wrapDiv.classList.toggle("expand", visible);
                break;
              case "hide":
                visible = false;
                wrapDiv.classList.toggle("expand", visible);
                break;
            }
          }
        });

        // Append los elementos al DOM
        container.appendChild(iframe);
        container.appendChild(fullscreenButton);
        wrapDiv.appendChild(stylesheet);
        wrapDiv.appendChild(container);
        document.body.appendChild(wrapDiv);
      })(globalThis);
    </script>
  </body>
</html>
